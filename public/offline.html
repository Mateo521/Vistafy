<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Desconectado | F33</title>
    <style>
        body {
            background-color: #050505;
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            border: 2px solid #E30613;
            background-color: #09090b;
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }
        .status-badge {
            display: inline-block;
            background-color: #E30613;
            color: #000000;
            font-size: 10px;
            font-weight: bold;
            padding: 4px 8px;
            letter-spacing: 2px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }
        h1 {
            font-family: Impact, 'Arial Black', sans-serif;
            font-size: 42px;
            margin: 0 0 20px 0;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: normal;
        }
        p {
            color: #a1a1aa;
            font-size: 12px;
            line-height: 1.6;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        button {
            background-color: transparent;
            color: #ffffff;
            border: 1px solid #E30613;
            padding: 15px 30px;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s;
        }
        button:hover {
            background-color: #E30613;
            color: #000000;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="status-badge">>_ ERR_NO_NETWORK</div>
        <h1>Sistema<br>desconectado</h1>
        <p>
            Tu dispositivo ha perdido la conexión a la red. F33 requiere acceso a internet para sincronizar datos y operar.
        </p>
        <button onclick="window.location.reload()">Reintentar Conexión</button>
    </div>
</body>
</html>
